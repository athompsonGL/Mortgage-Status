name: RSS to Statuspage

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Update Statuspage from RSS
        env:
          STATUSPAGE_API_KEY: ${{ secrets.STATUSPAGE_API_KEY }}
          STATUSPAGE_PAGE_ID: ${{ secrets.STATUSPAGE_PAGE_ID }}
          ICE_ENCOMPASS: ${{ secrets.ICE_ENCOMPASS }}
          ICE_ACADEMY: ${{ secrets.ICE_ACADEMY }}
          ICE_MSP: ${{ secrets.ICE_MSP }}
        run: python scripts/update_status.py